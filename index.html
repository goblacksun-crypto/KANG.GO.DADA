<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>캠핑장 날씨 대시보드</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f7f6f2;--bg2:#fff;--bg3:#f0efe9;
  --text:#1a1a18;--t2:#5f5e5a;--t3:#9a9992;
  --bd:rgba(0,0,0,.1);--bd2:rgba(0,0,0,.2);
  --teal:#1D9E75;--tl:#E1F5EE;--td:#085041;
  --blue:#378ADD;--bl:#E6F1FB;
  --amber:#BA7517;--al:#FAEEDA;
  --red:#E24B4A;--rl:#FCEBEB;
  --r:10px;--rs:6px
}
body{font-family:'Apple SD Gothic Neo','Noto Sans KR',sans-serif;background:var(--bg);color:var(--text);font-size:14px;overflow:hidden;height:100vh}
button{font-family:inherit;cursor:pointer}

/* ── 레이아웃 (PC 기본) ── */
.app { display: flex; flex-direction: column; height: 100vh; }
.hdr { background: var(--bg2); border-bottom: 1px solid var(--bd); padding: 0 14px; display: flex; align-items: center; gap: 10px; height: 50px; flex-shrink: 0; }
.main { display: flex; flex: 1; overflow: hidden; }

/* ── [수정 1] 모바일 스크롤 간섭 해결 (768px 이하) ── */
@media (max-width: 768px) {
  body { 
    overflow: auto !important; 
    height: auto !important; 
  }
  .app { 
    height: auto !important; 
    display: block !important; 
  }
  .main { 
    flex-direction: column !important;
    display: block !important;
    height: auto !important;
    overflow: visible !important;
  }
  .sb { 
    width: 100% !important; 
    height: auto !important; /* 고정 높이 해제하여 페이지와 일체화 */
    overflow: visible !important; 
    border-right: none !important;
    border-bottom: 1px solid var(--bd) !important;
  }
  .citems { 
    max-height: 450px !important; /* 목록 영역만 최소한의 스크롤 유지 */
    overflow-y: auto !important; 
  }
  .center { 
    width: 100% !important; 
    height: 450px !important; 
    flex: none !important;
  }
  .detail { 
    width: 100% !important; 
    height: auto !important; 
    overflow: visible !important; /* 상세 패널 내부 스크롤 해제: 전체 페이지와 함께 스크롤 */
    border-left: none !important;
    border-top: 1px solid var(--bd) !important;
  }
}

/* ── 사이드바 ── */
.sb{width:300px;flex-shrink:0;background:var(--bg2);border-right:1px solid var(--bd);display:flex;flex-direction:column;overflow:hidden}
.stabs{display:flex;border-bottom:1px solid var(--bd);flex-shrink:0}
.stab{flex:1;padding:9px 0;text-align:center;font-size:13px;font-weight:500;color:var(--t3);background:none;border:none;border-bottom:2px solid transparent}
.stab.on{color:var(--teal);border-bottom-color:var(--teal)}

/* 지역 빠른선택 버튼 */
.region-btns{padding:8px 10px;border-bottom:1px solid var(--bd);flex-shrink:0;display:flex;flex-wrap:wrap;gap:4px}
.rb{font-size:11px;padding:3px 9px;border-radius:99px;border:1px solid var(--bd2);background:var(--bg2);color:var(--t2);transition:all .12s}
.rb:hover{background:var(--bg3)}
.rb.on{background:var(--teal);color:#fff;border-color:var(--teal)}

/* 검색 */
.sp{padding:10px;border-bottom:1px solid var(--bd);flex-shrink:0}
.srow{display:flex;gap:5px;margin-bottom:6px}
.srow:last-child{margin-bottom:0}
select{flex:1;border:1px solid var(--bd2);border-radius:var(--rs);padding:6px 7px;font-size:12px;background:var(--bg);color:var(--text);font-family:inherit;outline:none}
select:focus{border-color:var(--teal)}
.si{flex:1;border:1px solid var(--bd2);border-radius:var(--rs);padding:6px 9px;font-size:12px;background:var(--bg);color:var(--text);font-family:inherit;outline:none}
.si:focus{border-color:var(--teal)}
.sbtn{padding:6px 12px;background:var(--teal);color:#fff;border:none;border-radius:var(--rs);font-size:12px;font-weight:600;white-space:nowrap}
.sbtn:hover{background:#178f68}
.sr{padding:6px 9px;background:var(--bg3);color:var(--t2);border:1px solid var(--bd2);border-radius:var(--rs);font-size:12px}

/* 칩 */
.chips{padding:8px 10px;border-bottom:1px solid var(--bd);flex-shrink:0}
.clabel{font-size:10px;color:var(--t3);margin:5px 0 3px;display:block}
.clabel:first-child{margin-top:0}
.crow{display:flex;flex-wrap:wrap;gap:4px}
.chip{font-size:11px;padding:3px 8px;border-radius:99px;border:1px solid var(--bd2);color:var(--t2);background:var(--bg2)}
.chip.on{background:var(--tl);border-color:var(--teal);color:var(--td)}

/* 목록 */
.lhdr{padding:6px 10px;font-size:11px;color:var(--t3);background:var(--bg3);border-bottom:1px solid var(--bd);display:flex;justify-content:space-between;align-items:center;flex-shrink:0}
.lhdr select{flex:none;font-size:10px;padding:1px 5px;width:auto;border-radius:4px}
.citems{overflow-y:auto;flex:1;will-change:transform}
.ci{padding:9px 10px;border-bottom:1px solid var(--bd);cursor:pointer;display:flex;gap:8px;align-items:flex-start}
.ci:hover{background:var(--bg3)}
.ci.on{background:var(--tl);border-left:3px solid var(--teal)}
.ci.on .cnm{color:var(--td)}
.cdot{width:7px;height:7px;border-radius:50%;margin-top:5px;flex-shrink:0}
.cbd{flex:1;min-width:0}
.cnm{font-size:12px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.csub{font-size:10px;color:var(--t3);margin-top:1px}
.ctags{display:flex;gap:3px;margin-top:3px;flex-wrap:wrap}
.ctag{font-size:9px;padding:1px 5px;border-radius:3px;background:var(--bg3);color:var(--t2)}
.crt{text-align:right;flex-shrink:0;display:flex;flex-direction:column;align-items:flex-end;gap:1px}
.favbtn{background:none;border:none;font-size:15px;padding:0;opacity:.3;line-height:1}
.favbtn.on{opacity:1;color:var(--red)}
.fav-empty{padding:2rem 1rem;text-align:center;color:var(--t3);font-size:12px;line-height:1.8}

/* 로딩 */
.lbar{height:2px;background:linear-gradient(90deg,var(--teal),var(--blue));animation:slide 1s infinite;display:none;flex-shrink:0}
.lbar.on{display:block}
@keyframes slide{0%{transform:translateX(-100%)}100%{transform:translateX(400%)}}

/* ── 지도/차트 ── */
.center{flex:1;display:flex;flex-direction:column;overflow:hidden}
.mtabs{display:flex;border-bottom:1px solid var(--bd);background:var(--bg2);padding:0 12px;flex-shrink:0}
.mtab{padding:9px 12px;font-size:12px;font-weight:500;color:var(--t3);background:none;border:none;border-bottom:2px solid transparent}
.mtab.on{color:var(--teal);border-bottom-color:var(--teal)}
.mviews{flex:1;position:relative;overflow:hidden}
.mv{position:absolute;inset:0;display:none}
.mv.on{display:flex}
.mapwrap{flex:1;position:relative;overflow:hidden;background:#a8c8d8}
#d3map{position:absolute;inset:0;width:100%;height:100%}
#d3map svg{width:100%;height:100%}
#d3map .province{fill:#e8f0d8;stroke:#7aa860;stroke-width:.5;transition:fill .15s}
#d3map .province-border{fill:none;stroke:#5a8840;stroke-width:1.5;pointer-events:none}
#d3map .province:hover{fill:#c8e0a8}
#d3map .province.hl{fill:#b8d890;stroke:#5a9040;stroke-width:1.2}
#d3map .sigungu-label{fill:#3a5a30;font-weight:600;pointer-events:none;text-anchor:middle}
#d3map .do-label{fill:#3a6a28;font-weight:700;pointer-events:none;text-anchor:middle}
.pins{position:absolute;inset:0;pointer-events:none}
.pin{position:absolute;pointer-events:all;cursor:pointer;transform:translate(-50%,-100%);transition:transform .15s;will-change:transform}
.pin:hover,.pin.sel{transform:translate(-50%,-100%) scale(1.18);z-index:20}
.pb{padding:3px 7px;border-radius:99px;font-size:10px;font-weight:700;color:#fff;white-space:nowrap;position:relative;box-shadow:0 2px 6px rgba(0,0,0,.25);max-width:120px;overflow:hidden;text-overflow:ellipsis}
.pb::after{content:'';position:absolute;bottom:-4px;left:50%;transform:translateX(-50%);border:4px solid transparent;border-bottom:none}
.pb.g{background:#1D9E75}.pb.g::after{border-top-color:#1D9E75}
.pb.y{background:#BA7517}.pb.y::after{border-top-color:#BA7517}
.pb.r{background:#E24B4A}.pb.r::after{border-top-color:#E24B4A}
.pb.fav{background:#c0392b}.pb.fav::after{border-top-color:#c0392b}
.mleg{position:absolute;bottom:12px;left:12px;background:rgba(255,255,255,.92);border-radius:var(--rs);padding:8px 10px;font-size:10px;border:1px solid var(--bd)}
.mleg div{display:flex;align-items:center;gap:6px;margin-bottom:3px}
.mleg div:last-child{margin-bottom:0}
.ldot{width:9px;height:9px;border-radius:50%}
.mctrl{position:absolute;top:10px;right:10px;display:flex;flex-direction:column;gap:3px}
.mcbtn{width:30px;height:30px;background:var(--bg2);border:1px solid var(--bd2);border-radius:var(--rs);font-size:15px;font-weight:700;display:flex;align-items:center;justify-content:center;box-shadow:0 1px 4px rgba(0,0,0,.1)}
.mcbtn:hover{background:var(--bg3)}
.minfo{position:absolute;top:10px;left:50%;transform:translateX(-50%);background:rgba(255,255,255,.9);border-radius:99px;padding:4px 12px;font-size:11px;color:var(--t2);border:1px solid var(--bd);white-space:nowrap;pointer-events:none}
.srcpanel{position:absolute;bottom:12px;right:12px;background:rgba(255,255,255,.88);border-radius:var(--rs);padding:7px 10px;font-size:9px;color:var(--t3);border:1px solid var(--bd);max-width:180px;line-height:1.8}
.srcpanel b{color:var(--t2);display:block;margin-bottom:2px;font-size:10px}

/* 통계 */
.chview{flex-direction:column;overflow-y:auto;padding:14px;gap:12px;background:var(--bg)}
.cpanel{background:var(--bg2);border-radius:var(--r);padding:12px;border:1px solid var(--bd)}
.cptitle{font-size:12px;font-weight:600;margin-bottom:8px}

/* 상세 패널 */
.detail{width:340px;flex-shrink:0;background:var(--bg2);border-left:1px solid var(--bd);overflow-y:auto;display:flex;flex-direction:column}
.dempty{flex:1;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:6px;color:var(--t3);font-size:12px;padding:2rem;text-align:center}
.dhdr{padding:12px;border-bottom:1px solid var(--bd)}
.d
